{% extends "base.html" %}

{% block title %}标签{% endblock %}

{% block head %}{% endblock %}

{% block body %}
<main class="page-container">
  <h1>标签</h1>
  <div class="tag-cloud" role="list">
    {% for tag_name, count in tags.items() %}
    <a href="/tags/{{ tag_name }}.html" class="tag-item" role="listitem">
      <span class="tag-name">#{{ tag_name }}</span>
      <span class="tag-count">({{ count }})</span>
    </a>
    {% endfor %}
  </div>
  <p>共{{ tags|length }}个标签</p>
</main>
{% endblock %}
