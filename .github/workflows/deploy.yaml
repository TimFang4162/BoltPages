name: Deploy to GitHub Pages

on:
  push:
    branches:
      - source
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: install dependencies
        run: python -m pip install --upgrade mistune pygments jinja2 pillow python-frontmatter minify-html rich

      - name: install typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          mv typst-x86_64-unknown-linux-musl "$HOME/.typst"
          rm -f typst.tar.xz
          echo "$HOME/.typst" >> $GITHUB_PATH
          ls -la "$HOME/.typst"

      - name: install mmdr
        run: |
          curl -L https://github.com/1jehuang/mermaid-rs-renderer/releases/download/v0.2.0/mmdr-x86_64-unknown-linux-gnu.tar.gz -o mmdr.tar.gz
          tar -xzf mmdr.tar.gz
          mkdir -p "$HOME/.local/bin"
          mv mmdr "$HOME/.local/bin/mmdr"
          chmod +x "$HOME/.local/bin/mmdr"
          rm -f mmdr.tar.gz
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mmdr --version

      - name: install blog package
        run: pip install -e .

      - name: build
        run: python -m blog build

      - name: deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
          cname: 'blog.timmy.host'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
